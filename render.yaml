services:
  - type: web
    name: launchpilot-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./apps/api/Dockerfile
    autoDeploy: true
    healthCheckPath: /v1/health
    envVars:
      - key: AUTH_MODE
        value: dev
      - key: WEB_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BACKBOARD_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@growthlaunchpad.app
      - key: BACKBOARD_BASE_URL
        value: https://app.backboard.io/api
      - key: BACKBOARD_LLM_PROVIDER
        value: openai
      - key: BACKBOARD_MODEL_NAME
        value: gpt-4o
      - key: BACKBOARD_MEMORY_MODE
        value: On
      - key: AUTH_JWT_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CONNECTOR_GOOGLE_CLIENT_ID
        sync: false
      - key: CONNECTOR_GOOGLE_CLIENT_SECRET
        sync: false
      - key: CONNECTOR_GITHUB_CLIENT_ID
        sync: false
      - key: CONNECTOR_GITHUB_CLIENT_SECRET
        sync: false
      # Litestream / S3 replication (set these in Render dashboard)
      - key: LITESTREAM_BUCKET
        sync: false
      - key: LITESTREAM_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false

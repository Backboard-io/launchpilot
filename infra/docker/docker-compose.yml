version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -e . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ../../:/workspace
    environment:
      SUPABASE_DB_URL: postgresql+psycopg://postgres:postgres@db:5432/postgres
    ports:
      - "8000:8000"
    depends_on:
      - db

  worker:
    image: python:3.12-slim
    working_dir: /workspace/apps/api
    command: sh -c "pip install -e . && python -m app.worker.runner"
    volumes:
      - ../../:/workspace
    environment:
      SUPABASE_DB_URL: postgresql+psycopg://postgres:postgres@db:5432/postgres
    depends_on:
      - db

volumes:
  pgdata:
